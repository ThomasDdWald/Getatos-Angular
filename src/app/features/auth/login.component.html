<div class="login-page">
  <div class="login-container">
    <div class="login-header">
      <img src="https://getatos-safari.com/wp-content/uploads/2025/01/Safari-logo-with-out-bg.png" alt="Getatos Safari">
      <h2>Welcome Back</h2>
      <p>Sign in to access your account</p>
    </div>
    <form (ngSubmit)="onLogin()" class="login-form">
      <div class="form-group"><label>Email Address</label><input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required></div>
      <div class="form-group"><label>Password</label><input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required></div>
      <button type="submit" class="btn btn-primary btn-lg" [disabled]="isLoading"><i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i> {{ isLoading ? 'Signing in...' : 'Sign In' }}</button>
    </form>
    <div class="demo-accounts">
      <p>Demo Accounts (click to login):</p>
      <div class="demo-buttons">
        <button (click)="loginAsAdmin()" class="demo-btn admin"><i class="fas fa-user-shield"></i> Admin</button>
        <button (click)="loginAsStaff()" class="demo-btn staff"><i class="fas fa-user-tie"></i> Staff</button>
        <button (click)="loginAsAgency()" class="demo-btn agency"><i class="fas fa-handshake"></i> Agency</button>
        <button (click)="loginAsCustomer()" class="demo-btn customer"><i class="fas fa-user"></i> Customer</button>
      </div>
    </div>
  </div>
</div>
