<div class="backoffice-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3><i class="fas fa-cogs"></i> Backoffice</h3>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/backoffice" routerLinkActive="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a routerLink="/backoffice"><i class="fas fa-calendar-check"></i> Bookings<span class="badge" *ngIf="pendingBookings > 0">{{ pendingBookings }}</span></a>
      <a routerLink="/backoffice"><i class="fas fa-map"></i> Tours</a>
      <a routerLink="/backoffice"><i class="fas fa-users"></i> Customers</a>
      <a routerLink="/backoffice"><i class="fas fa-chart-bar"></i> Reports</a>
    </nav>
  </aside>
  <main class="main-content">
    <header class="content-header">
      <h2>Dashboard</h2>
      <span class="date">{{ currentDate | date:'fullDate' }}</span>
    </header>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon revenue"><i class="fas fa-dollar-sign"></i></div>
        <div class="stat-info">
          <span class="stat-label">Total Revenue</span>
          <span class="stat-value">$0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon bookings"><i class="fas fa-calendar"></i></div>
        <div class="stat-info">
          <span class="stat-label">Total Bookings</span>
          <span class="stat-value">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon customers"><i class="fas fa-user-friends"></i></div>
        <div class="stat-info">
          <span class="stat-label">Active Customers</span>
          <span class="stat-value">0</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon rating"><i class="fas fa-star"></i></div>
        <div class="stat-info">
          <span class="stat-label">Average Rating</span>
          <span class="stat-value">0</span>
        </div>
      </div>
    </div>
  </main>
</div>
