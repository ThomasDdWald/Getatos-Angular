<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="container">
    <div class="navbar-content">
      <a routerLink="/" class="logo">
        <img src="https://getatos-safari.com/wp-content/uploads/2025/01/Safari-logo-with-out-bg.png" alt="Getatos Safari" class="logo-img">
      </a>
      <div class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a routerLink="/tours" routerLinkActive="active">Tours</a>
        <a routerLink="/about" routerLinkActive="active">About</a>
        <a routerLink="/contact" routerLinkActive="active">Contact</a>
        <ng-container *ngIf="!isAuthenticated">
          <a routerLink="/login" class="nav-cta">Login</a>
        </ng-container>
        <ng-container *ngIf="isAuthenticated">
          <a routerLink="/backoffice" routerLinkActive="active">Backoffice</a>
          <a routerLink="/agency" routerLinkActive="active">Agency</a>
          <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
          <button (click)="logout()" class="btn-logout">Logout</button>
        </ng-container>
      </div>
      <div class="language-switcher">
        <button class="lang-btn" (click)="toggleLangMenu()">
          <span class="current-lang">{{ currentLang.flag }}</span>
          <i class="fas fa-chevron-down"></i>
        </button>
        <div class="lang-dropdown" *ngIf="showLangMenu">
          <button *ngFor="let lang of languages" class="lang-option" [class.active]="lang.code === currentLang.code" (click)="setLanguage(lang)">
            <span class="lang-flag">{{ lang.flag }}</span>
            <span class="lang-name">{{ lang.name }}</span>
          </button>
        </div>
      </div>
      <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
        <i class="fas" [class.fa-bars]="!showMobileMenu" [class.fa-times]="showMobileMenu"></i>
      </button>
    </div>
    <div class="mobile-nav" *ngIf="showMobileMenu">
      <a routerLink="/" (click)="closeMobileMenu()">Home</a>
      <a routerLink="/tours" (click)="closeMobileMenu()">Tours</a>
      <a routerLink="/about" (click)="closeMobileMenu()">About</a>
      <a routerLink="/contact" (click)="closeMobileMenu()">Contact</a>
      <ng-container *ngIf="!isAuthenticated">
        <a routerLink="/login" (click)="closeMobileMenu()">Login</a>
      </ng-container>
      <ng-container *ngIf="isAuthenticated">
        <a routerLink="/dashboard" (click)="closeMobileMenu()">Dashboard</a>
        <button (click)="logout(); closeMobileMenu()">Logout</button>
      </ng-container>
    </div>
  </div>
</nav>
